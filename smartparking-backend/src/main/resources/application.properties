# ============================================================
#  Smart Parking App - Spring Boot Configuration
# ============================================================

server.port=8080

# ─────────────────────────────────────────────
#  MYSQL DATABASE
# ─────────────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/smartparkingdb?useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/smartparkingdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
#  APPLICATION
# ─────────────────────────────────────────────
app.name=CIT-U Smart Parking Management System
logging.level.com.citU.smartparking=DEBUG