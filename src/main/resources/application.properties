
#  Smart Parking App - Spring Boot Configuration

server.port=8080

# ─────────────────────────────────────────────
#  MYSQL (Active)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smartparkingdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
#  H2 IN-MEMORY DATABASE (disabled – using MySQL)
# ─────────────────────────────────────────────
# spring.datasource.url=jdbc:h2:mem:smartparkingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=create-drop

# ─────────────────────────────────────────────
#  APPLICATION
# ─────────────────────────────────────────────
app.name=CIT-U Smart Parking Management System
logging.level.com.citU.smartparking=DEBUG